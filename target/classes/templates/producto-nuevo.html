<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo producto</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

<main class="main">

    <!-- HEADER -->
    <div class="header">
        <h2>Nuevo producto</h2>
    </div>

    <!-- FORM CARD -->
    <form th:action="@{/productos/guardar}"
          method="post"
          class="card"
          style="max-width:440px; margin-top:20px">

        <!-- ERROR -->
        <div th:if="${error}" class="error-box">
            ⚠️ <span th:text="${error}"></span>
        </div>

        <!-- FIELD -->
        <div class="form-group">
            <label>Código</label>
            <input class="search"
                   type="text"
                   name="codigo"
                   placeholder="PRD-001"
                   pattern="PRD-[0-9]{3}"
                   required>
            <small class="hint">Formato requerido: PRD-001</small>
        </div>

        <div class="form-group">
            <label>Nombre</label>
            <input class="search" type="text" name="nombre" required>
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <textarea class="search" name="descripcion" rows="3" required></textarea>
        </div>

        <div class="form-group">
            <label>Categoría</label>
            <input class="search" type="text" name="categoria" required>
        </div>

        <div class="form-group">
            <label>Precio</label>
            <input class="search"
                   type="number"
                   step="0.01"
                   min="0"
                   name="precio"
                   required>
        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
            <button type="submit" class="search-btn"> Guardar</button>
            <a th:href="@{/productos}" class="clear-btn">Cancelar</a>
        </div>

    </form>

</main>

</body>
</html>
