<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Movimientos</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">📦 Inventario</div>

    <nav class="menu">
        <a th:href="@{/productos}">Productos</a>
        <a href="#" class="active">Movimientos</a>
        <a th:href="@{/proveedores}">Proveedores</a>
        <a th:href="@{/compras}">Compras</a>
        <a th:href="@{/historial-stock}">Historial stock</a>
        <a th:href="@{/historial-productos}">Historial productos</a>
        <a th:href="@{/usuarios}">Usuarios</a>
        <a th:href="@{/reportes/stock-minimo}">Reporte stock mínimo</a>
        <a th:href="@{/logout}">Salir</a>

    </nav>
</aside>

<main class="main">

    <!-- HEADER -->
    <div class="header">
        <h2>Movimientos de Inventario</h2>
    </div>


    <div style="display:flex; gap:20px; align-items:flex-start; flex-wrap:wrap;">

    <!-- FORM CARD -->
    <form method="post"
          th:action="@{/movimientos/registrar}"
          class="card"
          style="flex:1 1 320px; min-width:300px; max-width:420px; margin:0;">

        <h3 style="margin-bottom:15px;">Registrar movimiento</h3>

        <!-- ERROR -->
        <div th:if="${error}" class="error-box">
            ⚠️ <span th:text="${error}"></span>
        </div>

        <!-- SUCCESS -->
        <div th:if="${success}" class="success-box">
            ✅ <span th:text="${success}"></span>
        </div>

        <div class="form-group">
            <label>Código del producto</label>
            <input class="search"
                   id="buscadorProducto"
                   type="text"
                   placeholder="Buscar por código o nombre"
                   autocomplete="off"
                   style="margin-bottom:8px;">
            <select class="search" name="codigoProducto" required>
                <option value="">Seleccionar producto</option>
                <option th:each="p : ${productos}"
                        th:value="${p.codigo}"
                        th:text="${p.codigo + ' - ' + p.nombre}"
                        th:attr="data-search=${#strings.toLowerCase(p.codigo + ' ' + p.nombre)}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Tipo de movimiento</label>
            <select class="search" name="tipo" required>
                <option value="">Seleccionar</option>
                <option value="ENTRADA">Entrada</option>
                <option value="SALIDA">Salida</option>
                <option value="AJUSTE">Ajuste</option>
            </select>
        </div>

        <div class="form-group">
            <label>Cantidad</label>
            <input class="search"
                   type="number"
                   name="cantidad"
                   min="1"
                   required>
        </div>

        <div class="form-group">
            <label>Stock minimo</label>
            <input class="search"
                   type="number"
                   name="stockMinimo"
                   min="0"
                   placeholder="Opcional">
        </div>

        <div class="form-group">
            <label>Observación</label>
            <input class="search"
                   name="observacion"
                   placeholder="Opcional">
        </div>

        <div class="form-actions">
            <button class="search-btn">Registrar</button>
        </div>

    </form>

    <!-- TABLE CARD -->
    <div class="card" style="flex:2 1 620px; min-width:320px; margin:0;">

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; flex-wrap:wrap; gap:10px;">
            <h3 style="margin:0;">Historial reciente</h3>
            <form method="get" th:action="@{/movimientos}" style="display:flex; gap:8px; align-items:center;">
                <label for="limite" style="font-size:.85rem; color:#9ca3af;">Mostrar</label>
                <select id="limite" name="limite" class="search" style="min-width:90px;">
                    <option value="5" th:selected="${limite == 5}">5</option>
                    <option value="10" th:selected="${limite == 10}">10</option>
                    <option value="20" th:selected="${limite == 20}">20</option>
                </select>
                <button class="edit-btn" type="submit">Aplicar</button>
            </form>
        </div>

        <table class="table">
            <thead>
            <tr>
                <th>Producto</th>
                <th>Tipo</th>
                <th>Cantidad</th>
                <th>Fecha</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="m : ${movimientos}">
                <td th:text="${m.codigoProducto}"></td>

                <td>
                    <span th:text="${m.tipo}"
                          th:classappend="${m.tipo == 'ENTRADA' ? ' badge green' :
                                           m.tipo == 'SALIDA' ? ' badge red' :
                                           ' badge yellow'}">
                    </span>
                </td>

                <td th:text="${m.cantidad}"></td>

                <td th:text="${#dates.format(m.fecha, 'dd/MM/yyyy HH:mm')}"></td>
            </tr>

            <tr th:if="${#lists.isEmpty(movimientos)}">
                <td colspan="4" style="text-align:center; opacity:.6;">
                    Sin movimientos registrados
                </td>
            </tr>
            </tbody>
        </table>

    </div>

    </div>

</main>

<script>
    (function () {
        const buscador = document.getElementById('buscadorProducto');
        const select = document.querySelector('select[name="codigoProducto"]');

        if (!buscador || !select) return;

        const opcionesOriginales = Array.from(select.options).map(function (opt) {
            return {
                value: opt.value,
                text: opt.text,
                search: (opt.getAttribute('data-search') || '').toLowerCase()
            };
        });

        buscador.addEventListener('input', function () {
            const termino = buscador.value.trim().toLowerCase();
            const valorSeleccionado = select.value;
            select.innerHTML = '';

            opcionesOriginales.forEach(function (opcion) {
                const esPlaceholder = opcion.value === '';
                const coincide = esPlaceholder || opcion.search.indexOf(termino) !== -1;

                if (coincide) {
                    const opt = document.createElement('option');
                    opt.value = opcion.value;
                    opt.text = opcion.text;
                    if (esPlaceholder) {
                        opt.selected = !valorSeleccionado;
                    } else if (opcion.value === valorSeleccionado) {
                        opt.selected = true;
                    }
                    select.appendChild(opt);
                }
            });
        });
    })();
</script>

</body>
</html>
