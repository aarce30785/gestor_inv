<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos | Inventario</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
    <style>
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal-card {
            width: 100%;
            max-width: 520px;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
    </style>
</head>

<body>

<!-- SIDEBAR -->
<aside class="sidebar">
    <div class="logo">📦 Inventario</div>

    <nav class="menu">
        <a href="#" class="active">Productos</a>
        <a th:href="@{/movimientos}">Movimientos</a>
        <a th:href="@{/proveedores}">Proveedores</a>
        <a th:href="@{/compras}">Compras</a>
        <a th:href="@{/historial-stock}">Historial stock</a>
        <a th:href="@{/historial-productos}">Historial productos</a>
        <a th:href="@{/usuarios}">Usuarios</a>
        <a th:href="@{/reportes/stock-minimo}">Reporte stock mínimo</a>
        <a th:href="@{/logout}">Salir</a>

    </nav>
</aside>

<!-- MAIN -->
<main class="main">

    <!-- HEADER -->
    <div class="header">

        <div class="page-header">
            <h2 class="page-title">Productos</h2>

            <button type="button" class="btn-primary" id="openNuevoProductoBtn">
                + Añadir
            </button>
        </div>

        <!-- Mensajes flash -->
        <div th:if="${success}" class="success-box" th:text="${success}"></div>
        <div th:if="${error}"   class="error-box"   th:text="${error}"></div>

        <!-- Buscador -->
        <div class="search-container">
            <form method="get" th:action="@{/productos}" class="search-form">
                <input
                        type="text"
                        name="busqueda"
                        placeholder="Buscar producto..."
                        th:value="${busqueda}"
                        class="search-input"
                >
                <select name="categoria" class="search-input">
                    <option value="">Todas las categorías</option>
                    <option th:each="c : ${categorias}"
                            th:value="${c}"
                            th:text="${c}"
                            th:selected="${c == categoria}"></option>
                </select>
                <button type="submit" class="search-btn">🔍</button>
                <a th:href="@{/productos}" class="clear-btn">✖</a>
            </form>
        </div>
    </div>

    <!-- CARD -->
    <div class="card">

        <table>
            <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Categoría</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Acciones</th>
            </tr>
            </thead>

            <tbody>
            <!-- Si hay productos -->
            <tr th:each="p : ${productos}">
                <td th:text="${p.codigo}"></td>
                <td th:text="${p.nombre}"></td>
                <td><span class="badge" th:text="${p.categoria}"></span></td>
                <td class="precio" th:text="'₡' + ${p.precio}"></td>
                <td class="stock" th:text="${p.stock}"></td> <!-- mostrar stock -->
                <td class="actions">
                    <a th:href="@{/productos/editar/{codigo}(codigo=${p.codigo})}"
                       class="edit-btn">Editar</a>

                    <form th:action="@{/productos/eliminar}" method="post" style="display:inline">
                        <input type="hidden" name="codigo" th:value="${p.codigo}">
                        <button type="submit"
                                class="delete-btn"
                                onclick="return confirm('¿Desactivar producto? No será eliminado del sistema.')">
                            Desactivar
                        </button>
                    </form>
                </td>
            </tr>

            <!-- Si NO hay productos -->
            <tr th:if="${#lists.isEmpty(productos)}">
                <td colspan="6" style="text-align: center; font-style: italic;">
                    No hay resultados
                </td>
            </tr>
            </tbody>
        </table>


        <!-- PAGINATION -->
        <div class="pagination">
            <button>&lt;</button>
            <button class="active">1</button>
            <button>2</button>
            <button>3</button>
            <button>&gt;</button>
        </div>

    </div>

</main>

<div id="nuevoProductoModal" class="modal-overlay" th:classappend="${openNuevoModal} ? ' open' : ''">
    <div class="card modal-card">
        <div class="modal-header">
            <h3 style="margin:0;">Nuevo producto</h3>
            <button type="button" id="closeNuevoProductoBtn" class="delete-btn">Cerrar</button>
        </div>

        <div th:if="${errorNuevo}" class="error-box">
            <span th:text="${errorNuevo}"></span>
        </div>

        <form th:action="@{/productos/guardar}" method="post" class="form">
            <div class="form-group">
                <label>Código</label>
                <input class="search"
                       type="text"
                       name="codigo"
                       placeholder="PRD-001"
                       pattern="PRD-[0-9]{3}"
                       th:value="${nuevoCodigo}"
                       required>
                <small class="hint">Formato requerido: PRD-001</small>
            </div>

            <div class="form-group">
                <label>Nombre</label>
                <input class="search" type="text" name="nombre" th:value="${nuevoNombre}" required>
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <textarea class="search" name="descripcion" rows="3" th:text="${nuevoDescripcion}"></textarea>
            </div>

            <div class="form-group">
                <label>Categoría</label>
                <input class="search" type="text" name="categoria" th:value="${nuevoCategoria}" required>
            </div>

            <div class="form-group">
                <label>Precio</label>
                <input class="search"
                       type="number"
                       step="0.01"
                       min="0"
                       name="precio"
                       th:value="${nuevoPrecio}"
                       required>
            </div>

            <div class="form-actions">
                <button type="submit" class="search-btn">Guardar</button>
                <button type="button" class="clear-btn" id="cancelNuevoProductoBtn">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<script th:inline="javascript">
    (function () {
        const modal = document.getElementById('nuevoProductoModal');
        const openBtn = document.getElementById('openNuevoProductoBtn');
        const closeBtn = document.getElementById('closeNuevoProductoBtn');
        const cancelBtn = document.getElementById('cancelNuevoProductoBtn');

        if (!modal || !openBtn) return;

        function abrirModal() {
            modal.classList.add('open');
        }

        function cerrarModal() {
            modal.classList.remove('open');
        }

        openBtn.addEventListener('click', abrirModal);
        if (closeBtn) closeBtn.addEventListener('click', cerrarModal);
        if (cancelBtn) cancelBtn.addEventListener('click', cerrarModal);

        modal.addEventListener('click', function (event) {
            if (event.target === modal) {
                cerrarModal();
            }
        });
    })();
</script>

</body>
</html>
