<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reporte por categoria</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>

<aside class="sidebar">
    <div class="logo">📦 Inventario</div>
    <nav class="menu">
        <a th:href="@{/productos}">Productos</a>
        <a th:href="@{/movimientos}">Movimientos</a>
        <a th:href="@{/proveedores}">Proveedores</a>
        <a th:href="@{/compras}">Compras</a>
        <a th:href="@{/historial-stock}">Historial stock</a>
        <a th:href="@{/historial-productos}">Historial productos</a>
        <a th:href="@{/usuarios}">Usuarios</a>
        <a th:href="@{/reportes/stock-minimo}">Reporte stock mínimo</a>
        <a href="#" class="active">Reporte categoría</a>
        <a th:href="@{/logout}">Salir</a>
    </nav>
</aside>

<main class="main">
    <div class="header">
        <h2>Reporte de productos por categoria</h2>
    </div>

    <div class="card" style="max-width: 620px; margin-bottom: 20px;">
        <form method="get" th:action="@{/reportes/categoria}" class="form">
            <div class="form-group">
                <label>Categoria</label>
                <input type="text" name="categoria" th:value="${categoria}" placeholder="Perifericos">
            </div>
            <div class="form-actions">
                <button class="btn-primary" type="submit">Generar reporte</button>
                <a class="btn-secondary" th:href="@{/reportes/categoria}">Limpiar</a>
            </div>
        </form>
    </div>

    <div class="card">
        <table>
            <thead>
            <tr>
                <th>Codigo</th>
                <th>Nombre</th>
                <th>Categoria</th>
                <th>Precio</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.codigo}"></td>
                <td th:text="${p.nombre}"></td>
                <td th:text="${p.categoria}"></td>
                <td th:text="${p.precio}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(productos)}">
                <td colspan="4" style="text-align:center; opacity:.6;">Sin resultados para la categoria seleccionada</td>
            </tr>
            </tbody>
        </table>
    </div>
</main>

</body>
</html>
